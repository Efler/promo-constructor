services:

  pc_postgres:
    image: postgres:16-alpine
    container_name: pc_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - promo-constructor-network

  pc_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pc_pgadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5444}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
    depends_on:
      pc_postgres:
        condition: service_healthy
    volumes:
      - pc_pgadmin_data:/var/lib/pgadmin
    networks:
      - promo-constructor-network

  pc_backend:
    image: ${BACKEND_IMAGE:-promo-constructor-backend:latest}
    container_name: pc_backend
    restart: unless-stopped
    depends_on:
      pc_postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      PROJECT_NAME: "${BACKEND_PROJECT_NAME:-Promo Constructor Backend}"
      VERSION: "${BACKEND_VERSION:-0.1.0}"
      ENVIRONMENT: "${BACKEND_ENVIRONMENT:-production}"
      API_V1_PREFIX: "${BACKEND_API_V1_PREFIX:-/api/v1}"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pc_postgres:5432/${POSTGRES_DB}"
      SECRET_KEY: "${BACKEND_SECRET_KEY}"
      JWT_ALGORITHM: "${BACKEND_JWT_ALGORITHM:-HS256}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES:-120}"
      REFRESH_TOKEN_EXPIRE_MINUTES: "${BACKEND_REFRESH_TOKEN_EXPIRE_MINUTES:-180}"
      ACCESS_COOKIE_NAME: "${BACKEND_ACCESS_COOKIE_NAME:-pc_access_token}"
      REFRESH_COOKIE_NAME: "${BACKEND_REFRESH_COOKIE_NAME:-pc_refresh_token}"
      COOKIE_SECURE: "${BACKEND_COOKIE_SECURE:-true}"
      COOKIE_SAMESITE: "${BACKEND_COOKIE_SAMESITE:-lax}"
      BACKEND_CORS_ORIGINS: '${BACKEND_CORS_ORIGINS:-["http://localhost"]}'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - promo-constructor-network

  pc_frontend:
    image: ${FRONTEND_IMAGE:-promo-constructor-frontend:latest}
    container_name: pc_frontend
    restart: unless-stopped
    depends_on:
      pc_backend:
        condition: service_healthy
    environment:
      FRONTEND_SERVER_NAMES: "${FRONTEND_SERVER_NAMES:-_}"
      CERTBOT_CERT_NAME: "${CERTBOT_CERT_NAME:-}"
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - letsencrypt_etc:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - promo-constructor-network

  certbot:
    image: certbot/certbot:v5.5.0
    profiles:
      - certbot
    volumes:
      - letsencrypt_etc:/etc/letsencrypt
      - letsencrypt_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - promo-constructor-network

networks:
  promo-constructor-network:
    name: promo-constructor-network

volumes:
  pc_postgres_data:
  pc_pgadmin_data:
  letsencrypt_etc:
  letsencrypt_var:
  certbot_webroot:
